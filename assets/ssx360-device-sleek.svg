<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <!-- Background subtle gradient -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#09090b" stop-opacity="0" />
    </radialGradient>
    <!-- Matte metal gradient -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d2d30" />
      <stop offset="50%" stop-color="#1e1e24" />
      <stop offset="100%" stop-color="#121214" />
    </linearGradient>
    <!-- Gold contact gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <!-- USB metal gradient -->
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a1a1aa" />
      <stop offset="50%" stop-color="#e4e4e7" />
      <stop offset="100%" stop-color="#71717a" />
    </linearGradient>
  </defs>

  <!-- Soft Indigo Glow Background -->
  <circle cx="200" cy="200" r="180" fill="url(#glow)" />

  <!-- Technical grid circles -->
  <circle cx="200" cy="200" r="140" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1" />
  <circle cx="200" cy="200" r="100" fill="none" stroke="rgba(255,255,255,0.01)" stroke-width="1" />
  
  <!-- Shadow -->
  <ellipse cx="200" cy="320" rx="55" ry="10" fill="rgba(0,0,0,0.5)" filter="blur(6px)" />

  <!-- Device Body (Minimalist Matte Black Security Key) -->
  <g transform="translate(150, 95)">
    <!-- Main Key Body -->
    <rect x="10" y="20" width="80" height="150" rx="16" fill="url(#bodyGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" />
    
    <!-- Keychain Loop Hole -->
    <circle cx="50" cy="45" r="12" fill="#09090b" stroke="rgba(255,255,255,0.06)" stroke-width="1" />
    
    <!-- USB-A Connector -->
    <rect x="25" y="170" width="50" height="40" fill="url(#metalGrad)" rx="2" stroke="rgba(0,0,0,0.15)" stroke-width="1" />
    <!-- USB Internal pins line -->
    <rect x="35" y="195" width="30" height="4" fill="#18181b" />
    <line x1="42" y1="175" x2="42" y2="190" stroke="rgba(0,0,0,0.25)" stroke-width="2" />
    <line x1="58" y1="175" x2="58" y2="190" stroke="rgba(0,0,0,0.25)" stroke-width="2" />

    <!-- Gold Touch Contact Sensor -->
    <circle cx="50" cy="110" r="18" fill="url(#goldGrad)" stroke="#b45309" stroke-width="1.2" />
    <circle cx="50" cy="110" r="14" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1" stroke-dasharray="3,2" />
    
    <!-- Subtle LED light indicator -->
    <circle cx="50" cy="75" r="3" fill="#10b981" />
    <circle cx="50" cy="75" r="6" fill="none" stroke="#10b981" stroke-width="1" opacity="0.4" />
    
    <!-- Text / Label on device -->
    <text x="50" y="146" fill="rgba(255,255,255,0.2)" font-family="ui-monospace, monospace" font-size="7.5" font-weight="600" text-anchor="middle" letter-spacing="0.12em">SSX360</text>
  </g>
</svg>
