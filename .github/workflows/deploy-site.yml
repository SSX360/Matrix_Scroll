name: Deploy matrixscroll.com

on:
  push:
    branches: [main]
    paths:
      - "**/*.html"
      - "**/*.css"
      - "**/*.js"
      - "**/*.json"
      - "**/*.svg"
      - "**/*.ico"
      - "**/*.webp"
      - "**/*.png"
      - "**/*.xml"
      - "**/*.txt"
      - "api/**"
      - "assets/**"
      - "scripts/deploy-production.mjs"
      - "scripts/vercel-project.json"
      - "vercel.json"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-matrixscroll-site
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate deploy secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::Missing GitHub secret VERCEL_TOKEN for SSX360/Matrix_Scroll."
            echo "Create a token at https://vercel.com/account/tokens and add it under repo Secrets."
            exit 1
          fi

      - name: Install Vercel CLI
        run: npm install -g vercel@54

      - name: Deploy production
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_SCOPE: ssx-360
        run: node scripts/deploy-production.mjs
