name: Deploy matrixscroll.com

# NOTE: push trigger intentionally omitted for now to avoid an unplanned
# production deploy when this file lands on main. Re-enable by adding:
#   push:
#     branches: [main]
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-matrixscroll-site
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Vercel CLI
        run: npm install -g vercel@54

      - name: Deploy production (clean staging)
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: node scripts/deploy-production.mjs
