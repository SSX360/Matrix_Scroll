name: provenance-gate

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  scroll-gate:
    name: Scroll Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Matrix Scroll
        run: pip install "matrixscroll==0.2.6"

      - name: Detect envelope notes
        id: notes
        run: |
          set -euo pipefail
          git fetch origin refs/notes/matrixscroll:refs/notes/matrixscroll || true
          if git show-ref --verify --quiet refs/notes/matrixscroll; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Warn when notes missing (soft gate)
        if: steps.notes.outputs.present != 'true' && vars.ENFORCE_PROVENANCE != 'true'
        run: |
          {
            echo "## Matrix Scroll provenance gate"
            echo ""
            echo "**Status:** warning — envelope notes not published"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail when notes missing (hard gate on master only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master' && steps.notes.outputs.present != 'true' && vars.ENFORCE_PROVENANCE == 'true'
        run: |
          echo "Envelope notes ref refs/notes/matrixscroll not found." >&2
          exit 1

      - name: PR warn when notes missing (never block merge pre-dogfood)
        if: github.event_name == 'pull_request' && steps.notes.outputs.present != 'true'
        run: |
          {
            echo "## Matrix Scroll provenance gate"
            echo ""
            echo "**Status:** warning — envelope notes not published (PR merge allowed)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify PR commit envelope range
        if: github.event_name == 'pull_request' && steps.notes.outputs.present == 'true'
        uses: SSX360/matrixscroll-verify-action@v1
        with:
          head-ref: ${{ github.event.pull_request.head.sha }}
          base-ref: ${{ github.event.pull_request.base.sha }}
          source: notes
          notes-ref: refs/notes/matrixscroll
          fetch-notes: "false"
          matrixscroll-version: "0.2.6"
          summary-output: provenance-summary.json

      - name: Upload provenance summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provenance-summary
          path: provenance-summary.json
          if-no-files-found: ignore
